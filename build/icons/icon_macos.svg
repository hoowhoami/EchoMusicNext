<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
    <!-- macOS 标准：1024x1024 画布，图标主体占据中间 824x824 -->
    <!-- 如果你希望转换后的 PNG 四周不是透明而是纯白，可以在这里加一个满幅的 rect -->
    <!-- <rect width="1024" height="1024" fill="#FFFFFF"/> -->

    <!-- 图标主体：白底圆角矩形 -->
    <rect x="100" y="100" width="824" height="824" rx="140" fill="#FFFFFF"/>
    
    <!-- 装饰性波纹 -->
    <g opacity="0.1">
        <circle cx="512" cy="512" r="320" fill="none" stroke="#4A9EFF" stroke-width="2"/>
        <circle cx="512" cy="512" r="380" fill="none" stroke="#4A9EFF" stroke-width="1"/>
    </g>

    <!-- Echo 文字 -->
    <text x="512" y="460"
          font-family="system-ui, -apple-system, sans-serif"
          font-size="160"
          font-weight="800"
          fill="#1A1A1A"
          text-anchor="middle"
          letter-spacing="4">Echo</text>

    <!-- Music 文字 -->
    <text x="512" y="660"
          font-family="system-ui, -apple-system, sans-serif"
          font-size="180"
          font-weight="900"
          fill="#4A9EFF"
          text-anchor="middle"
          letter-spacing="8">MUSIC</text>
          
    <!-- 底部装饰横线 -->
    <rect x="412" y="720" width="200" height="6" rx="3" fill="#4A9EFF" opacity="0.5"/>
</svg>